<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Transformation - Next Milestone</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Manrope, "Segoe UI", sans-serif;
        background: linear-gradient(160deg, #06112a, #0a1838 55%, #0c2047);
        color: #e8efff;
      }

      .milestone-wrap {
        min-height: 760px;
        padding: 4.5rem 2rem;
        display: grid;
        place-items: center;
      }

      .milestone-card {
        width: min(960px, 100%);
        border: 1px solid rgba(157, 190, 255, 0.24);
        border-radius: 18px;
        background: rgba(9, 20, 46, 0.86);
        padding: 2.1rem;
        text-align: center;
      }

      .milestone-kicker {
        margin: 0 0 0.6rem;
        font-size: 0.82rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8db8ff;
        font-weight: 700;
      }

      .milestone-title {
        margin: 0 0 0.9rem;
        font-size: clamp(1.7rem, 4vw, 2.5rem);
        line-height: 1.15;
      }

      .milestone-body {
        margin: 0;
        color: #bfd0ef;
        line-height: 1.65;
        font-size: 1.05rem;
      }
    </style>
  </head>
  <body>
    <main class="milestone-wrap">
      <section class="milestone-card">
        <p class="milestone-kicker">Part 4</p>
        <h1 class="milestone-title">Digital Transformation has no finish line, only the next milestone.</h1>
        <p class="milestone-body">Placeholder section ready. Add your Part 4 content here.</p>
      </section>
    </main>
  </body>
</html>
